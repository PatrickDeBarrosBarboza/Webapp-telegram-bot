<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meu Carrinho</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #f4f4f7);
      --text-color: var(--tg-theme-text-color, #1c1c1e);
      --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
      --accent-color: var(--tg-theme-button-color, #007aff);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color); color: var(--text-color);
      margin: 0; padding: 15px 15px 100px 15px;
    }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h2 { margin: 0; font-size: 1.4rem; color: var(--accent-color); }
    .btn-refresh {
      background-color: var(--accent-color); color: white;
      border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;
    }
    .lista-compras { display: flex; flex-direction: column; gap: 10px; }
    .item-compra {
      background-color: var(--card-bg); border-radius: 12px; padding: 14px;
      display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .item-compra.marcado { opacity: 0.4; }
    .item-compra.marcado .nome-produto { text-decoration: line-through; }
    .info-produto { flex-grow: 1; }
    .nome-produto { font-weight: 600; font-size: 1rem; margin: 0 0 4px 0; }
    .detalhes-produto { font-size: 0.85rem; opacity: 0.6; margin: 0; }
    .preco-total-item { font-weight: 700; font-size: 1.05rem; }
    .rodape-total {
      position: fixed; bottom: 0; left: 0; right: 0;
      background-color: var(--card-bg); padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(0,0,0,0.05); z-index: 100;
    }
    .valor-geral { font-size: 1.4rem; font-weight: 800; color: var(--accent-color); }
  </style>
</head>
<body>

  <header>
    <h2>🛒 Carrinho Atual</h2>
    <button class="btn-refresh" onclick="carregarCarrinho()">🔄 Atualizar</button>
  </header>

  <div id="status" style="text-align:center; opacity:0.6; padding: 20px;">Buscando...</div>
  <div class="lista-compras" id="lista-container"></div>

  <div class="rodape-total">
    <span style="font-weight:bold; opacity:0.7;">TOTAL CAIXA:</span>
    <div class="valor-geral" id="total-geral">R$ 0,00</div>
  </div>

  <script>
    const TURSO_URL = 'https://api-db-ptkgstz13k.aws-us-east-1.turso.io'; 
    // INSIRA SEU TOKEN COMPLETO AQUI ABAIXO (Verifique se não faltam caracteres no final)
    const TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODMwNTc3MzIsImlkIjoiZWJjNDc4OTktODU1OC00YzllLWEyNmUtNjU3OTU0NTFjNTY2Iiwia2lkIjoiZVhsbENtMExOUlF2bVV1OTZ3ZzBveC1mNjJ2ZTA1dmg5SGpUb216eDlVYyIsInJpZCI6ImMzMWViZWJjLTg2ODQtNDM4OC04Y2QyLTIwYzJmYjY0NWM5YSJ9.nte9zxfGFE19nsDjdajRHCIpcJp5akKvObbnKm_qjbOkzTnU2dMON2jz74F3I3tq6Yq2NerWw3BxblqyBw4GDA';

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get('chat_id');

    function alternarItem(cb, id) {
      document.getElementById(`item-${id}`).classList.toggle('marcado', cb.checked);
    }

    async function carregarCarrinho() {
      const statusDiv = document.getElementById('status');
      const container = document.getElementById('lista-container');
      
      if (!chatId) {
        statusDiv.innerText = "Erro: chat_id ausente na URL.";
        return;
      }

      try {
        const response = await fetch(`${TURSO_URL}/v2/pipeline`, {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${TURSO_TOKEN}`, 
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({
            requests: [
              {
                type: "execute",
                stmt: { 
                  sql: "SELECT id, produto, valor_unitario, quantidade, valor_total FROM compras WHERE chat_id = ? ORDER BY id DESC", 
                  args: [{ type: "text", value: chatId.toString() }] 
                }
              },
              { type: "close" }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP Erro: ${response.status}`);
        }

        const dados = await response.json();
        
        if (!dados.results || dados.results[0].type === "error") {
          throw new Error(dados.results?.[0]?.error?.message || "Erro interno na query do banco.");
        }

        const linhas = dados.results[0].response.result.rows;
        statusDiv.style.display = 'none';

        if (linhas.length === 0) {
          container.innerHTML = '<p style="text-align:center;opacity:0.5;padding:20px;">Seu carrinho está vazio.</p>';
          document.getElementById('total-geral').innerText = "R$ 0,00";
          return;
        }

        let somaGeral = 0;
        container.innerHTML = linhas.map(row => {
          const id = row[0].value; 
          const prod = row[1].value;
          const vu = parseFloat(row[2].value || 0); 
          const qtd = parseInt(row[3].value || 1);
          const vt = parseFloat(row[4].value || 0);
          somaGeral += vt;

          return `
            <div class="item-compra" id="item-${id}">
              <input type="checkbox" onchange="alternarItem(this, ${id})" style="width:20px;height:20px;accent-color:var(--accent-color);">
              <div class="info-produto">
                <p class="nome-produto">${prod}</p>
                <p class="detalhes-produto">R$ ${vu.toFixed(2)} x ${qtd}</p>
              </div>
              <div class="preco-total-item">R$ ${vt.toFixed(2)}</div>
            </div>
          `;
        }).join('');

        document.getElementById('total-geral').innerText = `R$ ${somaGeral.toFixed(2)}`;
      } catch (e) { 
        console.error(e);
        statusDiv.style.display = 'block';
        statusDiv.innerText = "❌ Erro: " + e.message;
      }
    }

    // Inicializa a primeira busca
    carregarCarrinho();

    // Polling estável a cada 4 segundos
    setInterval(carregarCarrinho, 4000);
  </script>
</body>
</html>
