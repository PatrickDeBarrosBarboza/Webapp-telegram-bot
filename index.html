<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meu Carrinho de Compras</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #f4f4f7);
      --text-color: var(--tg-theme-text-color, #1c1c1e);
      --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
      --accent-color: var(--tg-theme-button-color, #007aff);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 15px 15px 90px 15px; /* Espaço inferior para o rodapé fixo */
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--accent-color);
    }

    .status {
      text-align: center;
      opacity: 0.6;
      font-size: 0.95rem;
      margin-top: 20px;
    }

    .lista-compras {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-compra {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease;
    }

    /* Estilo para quando o item for marcado como "no carrinho" */
    .item-compra.marcado {
      opacity: 0.5;
    }
    .item-compra.marcado .nome-produto {
      text-decoration: line-through;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-container input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    .info-produto {
      flex-grow: 1;
    }

    .nome-produto {
      font-weight: 600;
      font-size: 1.05rem;
      margin: 0 0 4px 0;
    }

    .detalhes-produto {
      font-size: 0.85rem;
      opacity: 0.6;
      margin: 0;
    }

    .categoria-tag {
      display: inline-block;
      font-size: 0.75rem;
      background-color: rgba(0, 0, 0, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 6px;
    }

    .preco-total-item {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-color);
      white-space: nowrap;
    }

    /* Rodapé Fixo com o Valor Geral Calculado */
    .rodape-total {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--card-bg);
      padding: 16px 20px;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.05);
      z-index: 100;
    }

    .rodape-total span {
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.8;
    }

    .rodape-total .valor-geral {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-color);
    }
  </style>
</head>
<body>

  <header>
    <h2>🛒 Meu Carrinho Atual</h2>
  </header>

  <div id="status" class="status">Buscando itens do mercado...</div>
  
  <div class="lista-compras" id="lista-container"></div>

  <!-- Barra de Total Geral Fixa no Fundo -->
  <div class="rodape-total">
    <span>TOTAL ESTIMADO:</span>
    <div class="valor-geral" id="total-geral">R$ 0,00</div>
  </div>

  <script>
    const TURSO_URL = 'https://api-db-ptkgstz13k.aws-us-east-1.turso.io'; 
    const TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODMwNTc3MzIsImlkIjoiZWJjNDc4OTktODU1OC00YzllLWEyNmUtNjU3OTU0NTFjNTY2Iiwia2lkIjoiZVhsbENtMExOUlF2bVV1OTZ3ZzBveC1mNjJ2ZTA1dmg5SGpUb216eDlVYyIsInJpZCI6ImMzMWViZWJjLTg2ODQtNDM4OC04Y2QyLTIwYzJmYjY0NWM5YSJ9.nte9zxfGFE19nsDjdajRHCIpcJp5akKvObbnKm_qjbOkzTnU2dMON2jz74F3I3tq6Yq2NerWw3BxblqyBw4GDA';

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get('chat_id');

    // Função auxiliar para riscar o item visualmente ao clicar no checkbox
    function alternarItem(elemento, cardId) {
      const card = document.getElementById(`item-${cardId}`);
      if (elemento.checked) {
        card.classList.add('marcado');
      } else {
        card.classList.remove('marcado');
      }
    }

    async function carregarCarrinho() {
      const container = document.getElementById('lista-container');
      const statusDiv = document.getElementById('status');
      const totalGeralDiv = document.getElementById('total-geral');

      if (!chatId) {
        statusDiv.innerText = "Erro: Usuário não identificado.";
        return;
      }

      try {
        // Consultando a nova tabela de compras ordenada pelas mais recentes adicionadas
        const response = await fetch(`${TURSO_URL}/v2/pipeline`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${TURSO_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            requests: [
              {
                type: "execute",
                stmt: {
                  sql: "SELECT id, produto, valor_unitario, quantidade, valor_total, categoria FROM compras WHERE chat_id = ? ORDER BY id DESC",
                  args: [{ type: "text", value: chatId.toString() }]
                }
              },
              { type: "close" }
            ]
          })
        });

        const dados = await response.json();
        
        if (!dados.results || dados.results.length === 0 || dados.results[0].type === "error") {
          throw new Error(dados.results?.[0]?.error?.message || "Erro ao ler tabela compras");
        }

        const linhas = dados.results[0].response.result.rows;
        statusDiv.style.display = 'none';

        if (linhas.length === 0) {
          container.innerHTML = '<p style="text-align:center; opacity:0.6; padding-top: 30px;">O seu carrinho está vazio.<br>Comece enviando itens ao bot!</p>';
          totalGeralDiv.innerText = "R$ 0,00";
          return;
        }

        let somaGeral = 0;

        // Renderização dinâmica da lista de mercado estruturada
        container.innerHTML = linhas.map(row => {
          const id = row[0].value;
          const produto = row[1].value;
          const valorUnitario = parseFloat(row[2].value);
          const quantidade = parseInt(row[3].value);
          const valorTotal = parseFloat(row[4].value);
          const categoria = row[5].value || "Outros";

          somaGeral += valorTotal;

          return `
            <div class="item-compra" id="item-${id}">
              <div class="checkbox-container">
                <input type="checkbox" onchange="alternarItem(this, ${id})">
              </div>
              <div class="info-produto">
                <p class="nome-produto">${produto}</p>
                <p class="detalhes-produto">R$ ${valorUnitario.toFixed(2)} x ${quantidade}</p>
                <span class="categoria-tag">${categoria}</span>
              </div>
              <div class="preco-total-item">
                R$ ${valorTotal.toFixed(2)}
              </div>
            </div>
          `;
        }).join('');

        // Atualiza a barra fixa inferior com a soma em tempo real de tudo
        totalGeralDiv.innerText = `R$ ${somaGeral.toFixed(2)}`;

      } catch (error) {
        console.error(error);
        statusDiv.innerText = "Erro ao sincronizar carrinho: " + error.message;
      }
    }

    carregarCarrinho();
  </script>
</body>
</html>
